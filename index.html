<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
        content="width=device-width, initial-scale=1.0">
    <title>Personal Web</title>
    <link 
        rel="stylesheet" 
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" 
        integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
</head>
<body>
    <!-- Creamos una barra de navegación con fondo oscuro.
    La clase "navbar-expand-lg" sirve para que el menú se vea compacto
    en un móvil pero completo en PC -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <!-- Ponemos título a la barra de navegación -->
        <a class="navbar-brand" href="#">
            <!-- Añadimos imagen de github a la barra de menú -->
            <img src="https://avatars.githubusercontent.com/u/57001190?s=460&v=4" 
                class="d-inline-block align-top"
                height="30" width="30" />
            Juna101
        </a>
        <!-- botón para desplegar el menú en modo responsivo -->
        <button class="navbar-toggler" type="button" 
            data-toggle="collapse" data-target="#entradas_menu">
            <!-- Esto hace que se vean las tres rayas del botón-->
            <span class="navbar-toggler-icon"></span>
        </button>
        <!-- Las entradas del menú propiamente dichas, 
        fíjate que el ID coincida con el data-target del 
        botón de arriba -->
        <div class="collapse navbar-collapse" id="entradas_menu">
            <!-- Los menús se hacen con listas -->
            <ul class="navbar-nav">
                <!-- Cada elemento de la lista es una entrada del menú -->
                <li class="nav-item">
                    <!-- El enlace con el título al que lleva el menú -->
                    <a class="nav-link" href="#" id="menu_inicio">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="menu_desarrollo_web">Web</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="menu_desarrollo_java">Java</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="menu_base_de_datos">Bases de datos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="menu_contacto">Contacto</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">        
        <div id="panel_inicio" class="panel">
            <p>Inicio</p>
        </div>
        <div id="panel_desarrollo_web" class="panel">
            <p>Desarrollo Web</p>
        </div>
        <div id="panel_desarrollo_java" class="panel">
            <p>Programas Java</p>
        </div>
        <div id="panel_base_de_datos" class="panel">
            <p>Bases de Datos</p>
        </div>
        <div id="panel_contacto" class="panel">
            <p>Contacto</p>
        </div>       
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" 
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" 
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" 
        integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous"></script>

    <script src="js/controlador.js"> </script>
    <script src="js/index.js"> </script>
</body>
</html>
